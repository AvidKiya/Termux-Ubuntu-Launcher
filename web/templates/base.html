<!doctype html><html lang="{{lang}}" dir="{{t.dir}}"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#070914"><title>{{t.title}}</title><link rel="stylesheet" href="/static/style.css"></head><body><div class="bg"></div><header class="top"><div class="logo">▲</div><div><b>Avid DevHub</b><small>{{t.subtitle}}</small></div><div class="lang"><a href="?lang=fa">FA</a><a href="?lang=en">EN</a></div></header><main class="wrap">{% block content %}{% endblock %}</main><nav class="bottom"><a class="{{'active' if page=='dashboard'}}" href="/?lang={{lang}}"><span>⌂</span><b>{{t.dashboard}}</b></a><a class="{{'active' if page=='agent'}}" href="/agent?lang={{lang}}"><span>⚡</span><b>Agent</b></a><a class="{{'active' if page=='cyber'}}" href="/cyber?lang={{lang}}"><span>🛡️</span><b>{{t.cyber}}</b></a><a class="{{'active' if page=='tasks'}}" href="/tasks?lang={{lang}}"><span>⚡</span><b>{{t.tasks}}</b></a><a class="{{'active' if page=='logs'}}" href="/logs?lang={{lang}}"><span>📜</span><b>{{t.logs}}</b></a></nav><button class="fab" onclick="location.href='/settings?lang={{lang}}'">⚙️</button><script src="/static/app.js"></script></body></html>
