{% extends 'base.html' %}{% block content %}<section class="hero"><h1>{{t.title}}</h1><p>{{t.subtitle}}</p><p class="note">{{t.terminal_note}}</p></section><h2>{{t.status}}</h2><section class="grid">{% for k,v in s.items() %}<div class="card"><h3>{{k}}</h3><b class="{{'ok' if v else 'bad'}}">{{t.ok if v else t.missing}}</b></div>{% endfor %}</section><section class="panel"><h2>{{t.quick}}</h2><div class="actions"><form method="post" action="/action/ubuntu_patch"><button>☣️ Patch Ubuntu</button></form><form method="post" action="/action/ai_all"><button>🤖 Install AI Pack</button></form><form method="post" action="/action/cyber_full"><button>🛡️ Install Cyber Full Pack</button></form><form method="post" action="/action/health"><button>🩺 Health Check</button></form></div></section>{% endblock %}
