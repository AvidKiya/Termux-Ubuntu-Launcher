{% extends 'base.html' %}{% block content %}<section class="page-head"><h1>⚡ {{t.tasks}}</h1><p>Background install and repair tasks.</p></section><section class="tool-list" id="tasks">{% for task in tasks %}<article class="tool"><div class="ico">{{'✅' if task.status=='done' else '⏳'}}</div><div><h3>{{task.title}}</h3><p><code>{{task.cmd}}</code><br>Status: {{task.status}}</p></div><a class="btn" href="/logs?file={{task.log}}&lang={{lang}}">Log</a></article>{% endfor %}</section>{% endblock %}
